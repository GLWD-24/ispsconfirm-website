<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>isps.confirm — Sneller via de app: scan, ordernummer, binnen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#131A22;--muted:#5B6B7A;--paper:#FFF;--mist:#F4F6F8;--line:#E3E8ED;
  --orange:#E8650F;--orange-soft:#FBEADC;--ok:#1F9D5B;--deny:#D6453D;--bg-el:#C7D2DC;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
.frame{width:min(960px,100%);}
.brand{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.05rem;margin-bottom:6px}
.brand .dot{color:var(--orange)}
.brand svg{width:22px;height:22px}
.stage{position:relative;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:linear-gradient(180deg,#fff 0%,#FAFBFC 100%)}
.stage svg.scene{width:100%;height:auto;display:block}

/* ---- trucks ---- */
.tA{transform:translateX(-460px);transition:transform 2.4s cubic-bezier(.45,0,.25,1)}
.on-tA-in .tA{transform:translateX(0)}
.on-tA-out .tA{transform:translateX(700px);transition-duration:2.6s}
.tB{transform:translateX(-460px);transition:transform 2.4s cubic-bezier(.45,0,.25,1)}
.on-tB-in .tB{transform:translateX(0)}
.snap .tA,.snap .tB,.snap .arm{transition:none!important}

/* ---- barrier ---- */
.arm{transform-box:fill-box;transform-origin:100% 50%;transform:rotate(0deg);transition:transform 1.4s ease-in-out}
.on-gate-open .arm{transform:rotate(66deg)}

/* ---- kiosk badge ---- */
.badge{opacity:0;transition:opacity .5s}
.on-res-ok .badge-ok{opacity:1}
.on-res-no .badge-no{opacity:1}
.kioskscan{opacity:0}
.on-scan .kioskscan{opacity:1;animation:kscan 2s ease-in-out infinite}
@keyframes kscan{0%,100%{transform:translateY(0)}50%{transform:translateY(78px)}}

/* ---- panel ---- */
.panel{opacity:0;transition:opacity .45s;pointer-events:none}
.panel.on{opacity:1}
.callout{opacity:0;transition:opacity .45s}
.callout.on{opacity:1}

/* panel inner animations: run when .on */
.panel .chip{opacity:.35}
.panel.on .chip{animation:chipin .4s ease forwards}
.panel.on .chip:nth-of-type(1){animation-delay:.15s}
.panel.on .chip:nth-of-type(2){animation-delay:.3s}
.panel.on .chip:nth-of-type(3){animation-delay:.45s}
.panel.on .chip:nth-of-type(4){animation-delay:.6s}
.panel.on .chip:nth-of-type(5){animation-delay:.75s}
.panel.on .chip:nth-of-type(6){animation-delay:.9s}
@keyframes chipin{to{opacity:1}}
.panel .chip-pick rect{fill:#fff;stroke:var(--line);transition:none}
.panel.on .chip-pick rect{animation:pick .5s ease forwards 1.7s}
.panel.on .chip-pick text{animation:picktxt .5s ease forwards 1.7s}
@keyframes pick{to{fill:#E8650F;stroke:#E8650F}}
@keyframes picktxt{to{fill:#fff}}

.typed tspan{opacity:0}
.panel.on .typed tspan{animation:chipin .08s ease forwards}
.panel.on .typed tspan:nth-child(1){animation-delay:.7s}
.panel.on .typed tspan:nth-child(2){animation-delay:1s}
.panel.on .typed tspan:nth-child(3){animation-delay:1.3s}
.panel.on .typed tspan:nth-child(4){animation-delay:1.6s}
.panel.on .typed tspan:nth-child(5){animation-delay:1.9s}
.caret{opacity:0}
.panel.on .caret{animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.sweep{opacity:0}
.panel.on .sweep{animation:sweepmove 2.2s ease-in-out .5s 1 forwards}
@keyframes sweepmove{0%{opacity:1;transform:translateY(0)}90%{opacity:1;transform:translateY(96px)}100%{opacity:0;transform:translateY(96px)}}
.stepcheck{opacity:0;transform:scale(.6);transform-box:fill-box;transform-origin:center}
.panel.on .stepcheck{animation:pop .45s cubic-bezier(.2,1.4,.4,1) forwards 2.7s}
@keyframes pop{to{opacity:1;transform:scale(1)}}

.dots10 circle{opacity:.25}
.panel.on .dots10 circle{animation:chipin .15s ease forwards}
.panel.on .dots10 circle:nth-child(1){animation-delay:.5s}
.panel.on .dots10 circle:nth-child(2){animation-delay:.7s}
.panel.on .dots10 circle:nth-child(3){animation-delay:.9s}
.panel.on .dots10 circle:nth-child(4){animation-delay:1.1s}
.panel.on .dots10 circle:nth-child(5){animation-delay:1.3s}
.panel.on .dots10 circle:nth-child(6){animation-delay:1.5s}
.panel.on .dots10 circle:nth-child(7){animation-delay:1.7s}
.panel.on .dots10 circle:nth-child(8){animation-delay:1.9s}
.panel.on .dots10 circle:nth-child(9){animation-delay:2.1s}
.panel.on .dots10 circle:nth-child(10){animation-delay:2.3s}
.panel.on .dots10 circle:nth-child(11){animation-delay:2.5s}
.formatok{opacity:0}
.panel.on .formatok{animation:chipin .4s ease forwards 2.9s}

.radar{transform-box:fill-box;transform-origin:center;opacity:0}
.panel.on .radar{opacity:1;animation:spin 1.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse3 circle{opacity:.2}
.panel.on .pulse3 circle{animation:p3 1.2s ease-in-out infinite}
.panel.on .pulse3 circle:nth-child(2){animation-delay:.2s}
.panel.on .pulse3 circle:nth-child(3){animation-delay:.4s}
@keyframes p3{0%,100%{opacity:.2}50%{opacity:1}}

.bigres{opacity:0;transform:scale(.7);transform-box:fill-box;transform-origin:center}
.panel.on .bigres{animation:pop .5s cubic-bezier(.2,1.4,.4,1) forwards .3s}
.reslines{opacity:0}
.panel.on .reslines{animation:chipin .5s ease forwards .8s}
.logline{opacity:0}
.panel.on .logline{animation:chipin .5s ease forwards 1.4s}

.qrmods rect{opacity:1}
.panel.on .qrmods .qm-a{animation:qmA 3s steps(1) infinite}
.panel.on .qrmods .qm-b{animation:qmB 3s steps(1) infinite}
@keyframes qmA{0%,49%{opacity:1}50%,100%{opacity:.15}}
@keyframes qmB{0%,49%{opacity:.15}50%,100%{opacity:1}}
.ring{transform-box:fill-box;transform-origin:center;transform:rotate(-90deg)}
.panel.on .ring circle{stroke-dasharray:88;stroke-dashoffset:0;animation:ringdown 3s linear infinite}
@keyframes ringdown{from{stroke-dashoffset:0}to{stroke-dashoffset:88}}
.tapbtn{transform-box:fill-box;transform-origin:center}
.panel.on .tapbtn{animation:tap .5s ease 1.9s 1}
@keyframes tap{50%{transform:scale(.93)}}
.tapdone{opacity:0}
.panel.on .tapdone{animation:chipin .4s ease forwards 2.4s}

/* ---- outro ---- */
.outro{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .6s}
.on-dim .outro{opacity:1}
.outro .wm{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:2rem;letter-spacing:-.02em}
.outro .wm .dot{color:var(--orange)}
.outro p{font-family:'JetBrains Mono',monospace;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

/* ---- caption & controls ---- */
.caption{min-height:64px;padding:16px 6px 4px;text-align:center}
.caption .lbl{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--orange)}
.caption p{font-size:.98rem;color:var(--ink);margin-top:6px}
.controls{display:flex;align-items:center;justify-content:center;gap:14px;padding:10px 0 4px}
.controls button{font-family:'Inter',sans-serif;font-weight:600;font-size:.9rem;border:1px solid var(--line);background:#fff;color:var(--ink);
  border-radius:10px;padding:.5em 1em;cursor:pointer;transition:border-color .15s}
.controls button:hover{border-color:var(--ink)}
.controls .play{background:var(--orange);border-color:var(--orange);color:#fff;min-width:88px}
.dotsnav{display:flex;gap:7px;justify-content:center;padding:10px 0 2px}
.dotsnav i{width:7px;height:7px;border-radius:50%;background:var(--line);transition:background .3s,transform .3s}
.dotsnav i.cur{background:var(--orange);transform:scale(1.25)}
.rm-note{display:none;text-align:center;font-size:.8rem;color:var(--muted);padding-top:6px}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition-duration:.01ms!important}
  .rm-note{display:block}
}
</style>
</head>

    <button id="btn-next" aria-label="Volgende stap">Volgende ›</button>
  </div>
  <p class="rm-note">Verminderde beweging actief — gebruik Vorige/Volgende om de stappen te bekijken.</p>
</div>

<script>
const steps=[
 {lbl:"AANKOMST",sub:"Een geregistreerde chauffeur arriveert — identiteit vooraf geverifieerd in de app.",dur:3400,cls:["tA-in"],panel:null},
 {lbl:"STAP 01 · SCAN",sub:"De chauffeur toont de roterende QR-code uit de app aan de scanner.",dur:4600,cls:["tA-in","scan"],panel:"p-qr"},
 {lbl:"STAP 02 · ORDERNUMMER",sub:"Enkel het ordernummer van de rit wordt nog bevestigd.",dur:3800,cls:["tA-in"],panel:"p-order"},
 {lbl:"OP DE ACHTERGROND",sub:"De havenverbod-check draait automatisch via AIGIS — bij elk bezoek, ook via de app.",dur:4200,cls:["tA-in","scan"],panel:"p-aigis"},
 {lbl:"STAP 03 · SNELLER BINNEN",sub:"De poort gaat open. Van scan tot doorrijden in enkele seconden.",dur:5600,cls:["tA-in","tA-out","gate-open","res-ok"],panel:"p-ok"},
 {lbl:"",sub:"Sneller binnen, nooit minder streng.",dur:4200,cls:["tA-in","tA-out","dim"],panel:null},
];
const root=document.getElementById('root');
const lblEl=document.getElementById('cap-lbl'),subEl=document.getElementById('cap-sub');
const panels=[...document.querySelectorAll('.panel')];
const pbox=document.getElementById('panelbox'),callout=document.getElementById('callout');
const nav=document.getElementById('dotsnav');
steps.forEach((s,i)=>{const d=document.createElement('i');d.addEventListener('click',()=>go(i,true));nav.appendChild(d);});
const navdots=[...nav.children];
let cur=0,timer=null,playing=true;
const reduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function apply(i,snap){
  const s=steps[i];
  root.className='stage'+(snap?' snap':'')+s.cls.map(c=>' on-'+c).join('');
  if(snap){void root.offsetWidth;root.classList.remove('snap');}
  panels.forEach(p=>p.classList.toggle('on',p.id===s.panel));
  const showBox=!!s.panel;
  pbox.classList.toggle('on',showBox);callout.classList.toggle('on',showBox);
  lblEl.textContent=s.lbl;subEl.textContent=s.sub;
  navdots.forEach((d,j)=>d.classList.toggle('cur',j===i));
}
function schedule(){
  clearTimeout(timer);
  if(!playing||reduced)return;
  timer=setTimeout(()=>{const n=(cur+1)%steps.length;go(n,n===0);},steps[cur].dur);
}
function go(i,snap){cur=i;apply(i,snap||false);schedule();}
document.getElementById('btn-prev').addEventListener('click',()=>go((cur-1+steps.length)%steps.length,true));
document.getElementById('btn-next').addEventListener('click',()=>go((cur+1)%steps.length,true));
const playBtn=document.getElementById('btn-play');
playBtn.addEventListener('click',()=>{playing=!playing;playBtn.textContent=playing?'Pauze':'Afspelen';if(playing)schedule();else clearTimeout(timer);});
if(reduced){playing=false;playBtn.textContent='Afspelen';}
go(0,true);
</script>
</body>
</html>
